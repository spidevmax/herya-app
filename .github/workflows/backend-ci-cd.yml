name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'herya-app-backend/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'herya-app-backend/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/backend-ci-cd.yml'

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: herya-app-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: herya-app-backend

      - name: Run linter (Biome)
        run: npm run lint
        working-directory: herya-app-backend

      - name: Run tests
        run: npm test
        working-directory: herya-app-backend

      - name: Build check
        run: npm run check
        working-directory: herya-app-backend

  docker-smoke:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend production image
        uses: docker/build-push-action@v6
        with:
          context: herya-app-backend
          target: prod
          tags: herya-backend:ci
          load: true
          cache-from: type=gha,scope=herya-backend
          cache-to: type=gha,mode=max,scope=herya-backend

      - name: Start temporary MongoDB
        run: |
          docker network create herya-ci
          docker run -d --name herya-mongo --network herya-ci \
            --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1" \
            --health-interval 2s --health-timeout 5s --health-retries 30 \
            mongo:7

      - name: Wait for MongoDB to be ready
        run: |
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' herya-mongo 2>/dev/null || echo "starting")
            if [ "$status" = "healthy" ]; then
              echo "MongoDB is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB did not become healthy in time"
          docker logs herya-mongo
          exit 1

      - name: Start backend container
        run: |
          docker run -d \
            --name herya-backend \
            --network herya-ci \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e DB_URL=mongodb://herya-mongo:27017/herya_ci \
            -e JWT_SECRET=ci_jwt_secret \
            -e FRONTEND_URL=http://localhost:8080 \
            -e CLOUDINARY_CLOUD_NAME=ci \
            -e CLOUDINARY_API_KEY=ci \
            -e CLOUDINARY_API_SECRET=ci \
            herya-backend:ci

      - name: Backend smoke test
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker logs herya-backend
          exit 1

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f herya-backend herya-mongo || true
          docker network rm herya-ci || true

