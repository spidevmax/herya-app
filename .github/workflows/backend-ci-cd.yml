name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'herya-app-backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'herya-app-backend/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: herya-app-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: herya-app-backend

      - name: Run linter (Biome)
        run: npm run lint
        working-directory: herya-app-backend

      - name: Run tests
        run: npm test
        working-directory: herya-app-backend

      - name: Build check
        run: npm run check
        working-directory: herya-app-backend
