name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    if: contains(github.event.head_commit.modified, 'herya-app-frontend/') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herya-app-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: herya-app-frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --maxWorkers=1
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: herya-app-backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: herya-app-backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run check
