name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'herya-app-frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'herya-app-frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: herya-app-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: herya-app-frontend

      - name: Run tests
        run: npm test -- --maxWorkers=1
        working-directory: herya-app-frontend

      - name: Build
        run: npm run build
        working-directory: herya-app-frontend
