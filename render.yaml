services:
  - type: web
    name: herya-backend
    runtime: docker
    repo: https://github.com/spidevmax/herya-app # UPDATE with your actual repo URL
    rootDir: herya-app-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    buildFilter:
      paths:
        - herya-app-backend/**
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically — do NOT set it here
      - key: DB_URL
        sync: false # means "set manually in dashboard" (secret)
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    healthCheckPath: /
    autoDeploy: true
