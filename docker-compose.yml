name: herya-app

services:
  backend:
    build:
      context: ./herya-app-backend
      target: dev
    container_name: herya-backend-dev
    env_file:
      - ./herya-app-backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./herya-app-backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./herya-app-frontend
      target: dev
    container_name: herya-frontend-dev
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./herya-app-frontend:/app
    depends_on:
      backend:
        condition: service_healthy
